# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 500
add_newline = true

format = """
$shell\
$username\
$hostname\
$container\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$docker_context\
$aws\
$time\
$cmd_duration\
$line_break\
$character"""

[palettes.catppuccin_frappe]
rosewater = "#f2d5cf"
flamingo = "#eebebe"
pink = "#f4b8e4"
mauve = "#ca9ee6"
red = "#e78284"
maroon = "#ea999c"
peach = "#ef9f76"
yellow = "#e5c890"
green = "#a6d189"
teal = "#81c8be"
sky = "#99d1db"
sapphire = "#85c1dc"
blue = "#8caaee"
lavender = "#babbf1"
text = "#c6d0f5"
subtext1 = "#b5bfe2"
subtext0 = "#a5adce"
overlay2 = "#949cbb"
overlay1 = "#838ba7"
overlay0 = "#737994"
surface2 = "#626880"
surface1 = "#51576d"
surface0 = "#414559"
base = "#303446"
mantle = "#292c3c"
crust = "#232634"

[shell]
# disabled = false

[container]
style = 'bold purple dimmed'

[directory]
truncation_length = 3
truncation_symbol = "../"
truncate_to_repo = true
read_only = "🔒"
read_only_style = "red"

[cmd_duration]
min_time = 200
show_milliseconds = true

[python]
python_binary = ['python', 'python3', 'python2']
